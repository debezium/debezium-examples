name: Build [db-activity-monitoring — order-service]

on:
  push:
    paths:
      - 'db-activity-monitoring/order-service/**'
      - '.github/workflows/db-activity-monitoring.yml'
  pull_request:
    paths:
      - 'db-activity-monitoring/order-service/**'
      - '.github/workflows/db-activity-monitoring.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('db-activity-monitoring/order-service/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Check changes in [db-activity-monitoring — order-service] example
        run: cd db-activity-monitoring && mvn clean install -f order-service/pom.xml -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn -Dmaven.wagon.http.pool=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

name: Build [ai-rag]

on:
  push:
    paths:
      - 'ai-rag/**'
      - '.github/workflows/ai-rag-workflow.yml'
      - 'scripts/run-example-test.py'
  pull_request:
    paths:
      - 'ai-rag/**'
      - '.github/workflows/ai-rag-workflow.yml'
      - 'scripts/run-example-test.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('ai-rag/client/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Quarkus Client
        run: mvn clean package -f ai-rag/client/pom.xml -DskipTests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Run ai-rag test
        run: python scripts/run-example-test.py ai-rag
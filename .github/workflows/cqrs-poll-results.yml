name: Build [CQRS — Pool Result]

on:
  push:
    paths:
      - 'cqrs/poll-results-service/**'
      - '.github/workflows/cqrs.yml'
  pull_request:
    paths:
      - 'cqrs/poll-results-service/**'
      - '.github/workflows/cqrs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('cqrs/poll-results-service/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Check changes in [cqrs - poll-result-service] example
        run: cd cqrs && mvn clean install -f poll-results-service/pom.xml -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn -Dmaven.wagon.http.pool=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
